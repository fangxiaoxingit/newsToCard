<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewsToCard - 历史记录</title>
  <link rel="stylesheet" href="history.css">
</head>
<body>
  <!-- 顶部栏 -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="logo-icon">✂️</span>
      <h1 class="brand">NewsToCard</h1>
      <span class="badge" id="countBadge">0</span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost" id="btnSelectAll" title="全选">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 12l2 2 4-4"/>
        </svg>
        全选
      </button>
      <button class="btn btn-ghost" id="btnDeselectAll" title="取消全选">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
        </svg>
        取消全选
      </button>
      <div class="divider-v"></div>
      <button class="btn btn-export" id="btnExportSelected" title="导出已选" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        导出已选
      </button>
      <button class="btn btn-danger" id="btnDeleteSelected" title="清除已选" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
        </svg>
        清除已选
      </button>
      <button class="btn btn-ghost" id="btnRefresh" title="刷新列表">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 4v6h-6"/>
          <path d="M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        刷新
      </button>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="main-content">
    <!-- 空状态 -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-icon">📷</div>
      <h2>暂无截图记录</h2>
      <p>点击页面右上角的浮球开始截图</p>
    </div>

    <!-- 网格列表 -->
    <div class="grid" id="grid"></div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>加载中...</span>
    </div>
  </main>

  <!-- 图片预览弹窗 -->
  <div class="modal" id="previewModal">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modalClose">&times;</button>
      <img class="modal-img" id="modalImg" src="" alt="预览">
      <div class="modal-footer">
        <span class="modal-info" id="modalInfo"></span>
        <div class="modal-actions">
          <button class="btn btn-primary" id="btnCopyImage">复制图片</button>
          <button class="btn btn-ghost" id="btnOpenUrl">打开原网址</button>
          <button class="btn btn-ghost" id="btnDownload">下载</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../lib/jszip.min.js"></script>
  <script src="../lib/storage.js"></script>
  <script src="history.js"></script>
</body>
</html>
